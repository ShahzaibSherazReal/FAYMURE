# FAYMURE – NGINX server block (production)
# Force HTTPS + www with a single 301, then serve PHP via FastCGI.
# Include this inside http {} or paste into your existing server config.
# Assumes site is at document root; adjust root/path if in subdir.

# Redirect non-www and HTTP to https://www (one redirect)
server {
    listen 80;
    listen [::]:80;
    server_name faymure.com www.faymure.com;
    return 301 https://www.faymure.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name faymure.com;
    # Single redirect: HTTPS bare domain -> www
    return 301 https://www.faymure.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.faymure.com;
    root /var/www/faymure;   # adjust to your document root
    index index.php index.html;

    # SSL (use your cert paths)
    ssl_certificate     /etc/ssl/certs/faymure.com.crt;
    ssl_certificate_key /etc/ssl/private/faymure.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Logs
    access_log /var/log/nginx/faymure_access.log;
    error_log  /var/log/nginx/faymure_error.log;

    # Static asset caching
    location ~* \.(ico|jpe?g|png|gif|webp|svg|css|js|woff2?|otf|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php-fpm.sock;   # or 127.0.0.1:9000
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 60;
    }

    location ~ /\.(ht|git) {
        deny all;
    }
}
